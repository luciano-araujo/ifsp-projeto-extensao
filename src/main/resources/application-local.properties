# ============================================
# LOCAL DEVELOPMENT PROFILE
# Defaults are provided for convenience.
# Override via env vars if needed.
# ============================================

# Database (local MySQL)
spring.datasource.url=jdbc:mysql://localhost:3306/db_tcc?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:root}

# SQL logging (enabled for debugging)
spring.jpa.show-sql=true

# JWT (dev-only default secret)
app.jwt.secret=${JWT_SECRET:creator-workbench-default-secret-change-in-production}

# Email
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}

# CORS (local frontend)
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000}
