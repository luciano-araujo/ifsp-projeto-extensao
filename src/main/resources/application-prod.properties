# ============================================
# PRODUCTION PROFILE
# No fallback defaults. All values MUST be
# provided via environment variables.
# The app will fail to start if any are missing.
# ============================================

# Database
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

# SQL logging (disabled in production)
spring.jpa.show-sql=false

# JWT (no default - must set JWT_SECRET)
app.jwt.secret=${JWT_SECRET}

# Email
spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}

# CORS (no default - must set CORS_ORIGINS, e.g. https://yourdomain.com)
app.cors.allowed-origins=${CORS_ORIGINS}

# Actuator (restrict exposure in production)
management.endpoints.web.exposure.include=health,info
